name: upgrade
description: "UPGRADE - Gamified Habit Tracker. Level up your life."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  flutter_notion_avatar: ^0.0.5
  file_picker: ^8.1.6
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_black_bg.png"
  adaptive_icon_background: "#191919"
  adaptive_icon_foreground: "assets/icons/icon_black_bg.png"
  web:
    generate: true
    image_path: "assets/icons/icon_black_bg.png"
  windows:
    generate: true
    image_path: "assets/icons/icon_black_bg.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
